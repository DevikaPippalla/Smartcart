{% extends "base.html" %}
{% block content %}

<div class="main" style="display:flex; justify-content:center; align-items:center; min-height:80vh;">
    
    <div style="background:white; padding:30px; width:400px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
        
        <h2 style="text-align:center; margin-bottom:20px;">Add Delivery Address</h2>

        <form method="POST">

            <div style="margin-bottom:15px;">
                <input type="text" name="full_name" placeholder="Full Name" required
                       style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;">
            </div>

            <div style="margin-bottom:15px;">
                <input type="text" name="phone" placeholder="Phone Number" required
                       style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;">
            </div>

            <div style="margin-bottom:15px;">
                <textarea name="address" placeholder="Full Address" required
                          style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; height:80px;"></textarea>
            </div>

            <div style="margin-bottom:15px;">
                <input type="text" name="city" placeholder="City" required
                       style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;">
            </div>

            <div style="margin-bottom:15px;">
                <input type="text" name="state" placeholder="State" required
                       style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;">
            </div>

            <div style="margin-bottom:20px;">
                <input type="text" name="pincode" placeholder="Pincode" required
                       style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;">
            </div>

            <button type="submit"
                    style="width:100%; padding:12px; background:#1f66d1; color:white; border:none; border-radius:8px; font-size:16px;">
                Save & Continue to Payment
            </button>

        </form>

    </div>

</div>

{% endblock %}
