{% extends "base.html" %}
{% block content %}

<div class="main" style="flex-direction: column; align-items: flex-start; width:100%;">

    <h2 style="color:#0b0a0a; margin-bottom:15px;">
        Welcome, {{ user_name }}!
    </h2>

<div class="filter-bar" style="margin-top:20px; display:flex; gap:40px; flex-wrap:wrap;">

    <!-- SEARCH FORM -->
    <form method="GET" action="/user-dashboard"
          style="display:flex; gap:10px; align-items:center;">

        <input type="text"
               name="search"
               placeholder="Search product..."
               value="{{ request.args.get('search','') }}"
               style="
                    padding:10px;
                    width:250px;
                    border-radius:6px;
                    border:1px solid #ccc;
               ">

        <button type="submit"
                style="
                    padding:10px 18px;
                    background:#007bff;
                    color:white;
                    border:none;
                    border-radius:6px;
                    cursor:pointer;
                ">
            Search
        </button>

    </form>

    <!-- FILTER FORM -->
    <form method="GET" action="/user-dashboard"
          style="display:flex; gap:10px; align-items:center;">

        <select name="category"
                style="
                    padding:10px;
                    width:200px;
                    border-radius:6px;
                    border:1px solid #ccc;
                ">
            <option value="">All Categories</option>
            {% for cat in categories %}
            <option value="{{ cat[0] }}"
                {% if request.args.get('category') == cat[0] %}selected{% endif %}>
                {{ cat[0] }}
            </option>
            {% endfor %}
        </select>

        <button type="submit"
                style="
                    padding:10px 18px;
                    background:#28a745;
                    color:white;
                    border:none;
                    border-radius:6px;
                    cursor:pointer;
                ">
            Filter
        </button><br>


    </form>

</div>

    <!-- PRODUCT CARDS -->
    <div style="
        display:flex;
        flex-wrap:wrap;
        gap:20px;
        margin-top:20px;
    ">

        {% for product in products %}
        <div class="card"
             style="
                width:220px;
                padding:15px;
                display:flex;
                flex-direction:column;
                justify-content:space-between;
                text-align:center;
             ">

            <!-- Product Image -->
            <div style="height:120px; display:flex; align-items:center; justify-content:center;">
                {% if product[4] %}
                <img src="{{ url_for('static',
                    filename='uploads/product_images/' ~ product[4]) }}"
                    style="max-width:100%; max-height:100%; object-fit:contain;">
                {% else %}
                <p>No Image</p>
                {% endif %}
            </div>

            <!-- Product Info -->
            <div>
                <h3 style="margin:8px 0;">{{ product[1] }}</h3>
                <p style="color:#555; margin:4px 0;">{{ product[2] }}</p>
                <p style="margin:6px 0;"><strong>₹{{ product[3] }}</strong></p>
            </div>

            <!-- Buttons -->
            <a href="/user/product/{{ product[0] }}"
               style="
                    margin-top:10px;
                    display:block;
                    background:#ff6b6b;
                    color:#fff;
                    padding:8px;
                    border-radius:5px;
                    text-decoration:none;
               ">
                View Details
            </a>

            <a href="/user/add-to-cart/{{ product[0] }}">
                <button style="
                    margin-top:8px;
                    padding:8px;
                    background:#28a745;
                    color:white;
                    border:none;
                    border-radius:5px;
                    cursor:pointer;
                ">
                    Add to Cart
                </button>
            </a>

        </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
