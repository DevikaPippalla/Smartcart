{% extends "base.html" %}
{% block title %}Payment{% endblock %}

{% block content %}

<style>
.payment-wrapper{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:60px 20px;
}

.payment-card{
    width:400px;
    background:#ffffff;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    text-align:center;
}

.payment-card h2{
    margin-bottom:15px;
    color:#333;
}

.amount-box{
    background:#f4f6f9;
    padding:15px;
    border-radius:8px;
    margin:20px 0;
}

.amount-box p{
    margin:0;
    font-size:16px;
    color:#555;
}

.amount-box h3{
    margin:8px 0 0 0;
    font-size:24px;
    color:#2c3e50;
}

.pay-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(45deg,#3399cc,#0066ff);
    color:#fff;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.pay-btn:hover{
    transform:scale(1.05);
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
</style>
<div class="page-wrapper"></div>
<div class="payment-wrapper">
    <div class="payment-card">
        <h2>Complete Your Payment</h2>

        <div class="amount-box">
            <p>Total Amount</p>
            <h3>₹{{ amount }}</h3>
        </div>

        <button id="rzp-button" class="pay-btn">
            💳 Pay Securely
        </button>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
var options = {
    "key": "{{ key_id }}",
    "amount": "{{ amount|int * 100 }}",
    "currency": "INR",
    "name": "SmartCart",
    "description": "Order Payment",
    "order_id": "{{ order_id }}",

    "handler": function (response){
        var form = document.createElement("form");
        form.method = "POST";
        form.action = "/verify-payment";

        var fields = {
            razorpay_payment_id: response.razorpay_payment_id,
            razorpay_order_id: response.razorpay_order_id,
            razorpay_signature: response.razorpay_signature
        };

        for (var key in fields) {
            var input = document.createElement("input");
            input.type = "hidden";
            input.name = key;
            input.value = fields[key];
            form.appendChild(input);
        }

        document.body.appendChild(form);
        form.submit();
    },

    "theme": { "color": "#3399cc" }
};

var rzp = new Razorpay(options);

document.getElementById('rzp-button').onclick = function(e){
    rzp.open();
    e.preventDefault();
}
</script>

{% endblock %}
