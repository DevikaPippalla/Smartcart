{% extends 'base.html' %}

{% block title %}Add Product{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center page-wrapper">

    <div class="card shadow-lg p-4 product-card">

        <h3 class="text-center mb-4">Add New Product</h3>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-success text-center">
                {{ message }}
            </div>
          {% endfor %}
        {% endwith %}

        <form method="POST"
              action="/admin/add-item"
              enctype="multipart/form-data">

            <div class="mb-3">
                <input type="text"
                       class="form-control"
                       name="name"
                       placeholder="Enter product name"
                       required>
            </div>

            <div class="mb-3">
                <textarea class="form-control desc-box"
                          name="description"
                          placeholder="Enter product description"
                          required></textarea>
            </div>

            <div class="mb-3">
                <input type="text"
                       class="form-control"
                       name="category"
                       placeholder="Enter product category (e.g., Electronics)"
                       required>
            </div>

            <div class="mb-3">
                <input type="number"
                       step="0.01"
                       class="form-control"
                       name="price"
                       placeholder="Enter price in ₹"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Product Image</label>
                <input type="file"
                       class="form-control"
                       name="image"
                       accept="image/*"
                       required>
            </div>

            <div class="d-grid gap-2 mt-3">
                <button type="submit" class="btn btn-success">
                    Add Product
                </button>

                <a href="/admin-dashboard" class="btn btn-outline-secondary">
                    Back to Dashboard
                </a>
            </div>

        </form>

    </div>

</div>

{% endblock %}
